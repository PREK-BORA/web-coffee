<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Costa Coffee</title>
    <link rel="stylesheet" href="file/contact.css">
</head>
<body>
    <section id="contact" class="contact-section">
    <nav class="navbar">
        <div class="logo">Costa<span>Coffee</span></div>
         <a href="index.html" class="button">Back to Home Page</a>
     </nav>
            <hr class="separator">
            <form class="contact-form">
                <h2 class="title2">Contact Us</h2>
                <input type="text" placeholder="Enter Your Name:" >
                <input type="number" placeholder="Enter Your Phone Number:">
                <input type="email" placeholder="Your Email Address:" >
                <textarea placeholder="How can we help you today?" rows="4" required></textarea>
                <button  type="submit" class="btn-submit">Send Message</button>
            </form> 
    </section>

    </footer>
</body>
</html>
